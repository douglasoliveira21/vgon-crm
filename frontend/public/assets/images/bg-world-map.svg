<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" fill="none">
  <g stroke="rgba(255,255,255,0.4)" stroke-width="0.5">
    <!-- Simplified world map as connected dots and lines -->
    <!-- North America -->
    <circle cx="300" cy="350" r="2"/><circle cx="320" cy="340" r="1.5"/><circle cx="340" cy="360" r="2"/>
    <circle cx="280" cy="380" r="1.5"/><circle cx="310" cy="400" r="2"/><circle cx="350" cy="380" r="1.5"/>
    <circle cx="260" cy="420" r="2"/><circle cx="290" cy="440" r="1.5"/><circle cx="330" cy="420" r="2"/>
    <circle cx="370" cy="400" r="1.5"/><circle cx="250" cy="360" r="2"/><circle cx="360" cy="340" r="1.5"/>
    <line x1="300" y1="350" x2="320" y2="340"/><line x1="320" y1="340" x2="340" y2="360"/>
    <line x1="280" y1="380" x2="310" y2="400"/><line x1="310" y1="400" x2="350" y2="380"/>
    <line x1="260" y1="420" x2="290" y2="440"/><line x1="290" y1="440" x2="330" y2="420"/>
    <line x1="300" y1="350" x2="280" y2="380"/><line x1="340" y1="360" x2="370" y2="400"/>
    <!-- South America -->
    <circle cx="420" cy="550" r="2"/><circle cx="440" cy="580" r="1.5"/><circle cx="430" cy="620" r="2"/>
    <circle cx="450" cy="660" r="1.5"/><circle cx="440" cy="700" r="2"/><circle cx="420" cy="740" r="1.5"/>
    <circle cx="410" cy="780" r="2"/><circle cx="460" cy="600" r="1.5"/>
    <line x1="420" y1="550" x2="440" y2="580"/><line x1="440" y1="580" x2="430" y2="620"/>
    <line x1="430" y1="620" x2="450" y2="660"/><line x1="450" y1="660" x2="440" y2="700"/>
    <line x1="440" y1="700" x2="420" y2="740"/><line x1="420" y1="740" x2="410" y2="780"/>
    <!-- Europe -->
    <circle cx="750" cy="300" r="2"/><circle cx="780" cy="310" r="1.5"/><circle cx="810" cy="290" r="2"/>
    <circle cx="770" cy="340" r="1.5"/><circle cx="800" cy="350" r="2"/><circle cx="830" cy="320" r="1.5"/>
    <circle cx="740" cy="330" r="2"/><circle cx="760" cy="360" r="1.5"/><circle cx="820" cy="360" r="2"/>
    <line x1="750" y1="300" x2="780" y2="310"/><line x1="780" y1="310" x2="810" y2="290"/>
    <line x1="770" y1="340" x2="800" y2="350"/><line x1="800" y1="350" x2="830" y2="320"/>
    <line x1="750" y1="300" x2="770" y2="340"/><line x1="810" y1="290" x2="830" y2="320"/>
    <!-- Africa -->
    <circle cx="780" cy="480" r="2"/><circle cx="800" cy="520" r="1.5"/><circle cx="820" cy="560" r="2"/>
    <circle cx="790" cy="600" r="1.5"/><circle cx="810" cy="640" r="2"/><circle cx="770" cy="550" r="1.5"/>
    <circle cx="830" cy="500" r="2"/><circle cx="760" cy="500" r="1.5"/>
    <line x1="780" y1="480" x2="800" y2="520"/><line x1="800" y1="520" x2="820" y2="560"/>
    <line x1="820" y1="560" x2="790" y2="600"/><line x1="790" y1="600" x2="810" y2="640"/>
    <line x1="780" y1="480" x2="770" y2="550"/><line x1="830" y1="500" x2="820" y2="560"/>
    <!-- Asia -->
    <circle cx="1000" cy="320" r="2"/><circle cx="1040" cy="340" r="1.5"/><circle cx="1080" cy="350" r="2"/>
    <circle cx="1120" cy="370" r="1.5"/><circle cx="1060" cy="380" r="2"/><circle cx="1100" cy="400" r="1.5"/>
    <circle cx="1140" cy="350" r="2"/><circle cx="980" cy="350" r="1.5"/><circle cx="1020" cy="380" r="2"/>
    <circle cx="1160" cy="400" r="1.5"/><circle cx="1200" cy="380" r="2"/>
    <line x1="1000" y1="320" x2="1040" y2="340"/><line x1="1040" y1="340" x2="1080" y2="350"/>
    <line x1="1080" y1="350" x2="1120" y2="370"/><line x1="1120" y1="370" x2="1140" y2="350"/>
    <line x1="1060" y1="380" x2="1100" y2="400"/><line x1="1100" y1="400" x2="1160" y2="400"/>
    <line x1="1000" y1="320" x2="980" y2="350"/><line x1="1140" y1="350" x2="1200" y2="380"/>
    <!-- Australia -->
    <circle cx="1200" cy="650" r="2"/><circle cx="1240" cy="660" r="1.5"/><circle cx="1220" cy="690" r="2"/>
    <circle cx="1260" cy="680" r="1.5"/><circle cx="1180" cy="670" r="2"/>
    <line x1="1200" y1="650" x2="1240" y2="660"/><line x1="1240" y1="660" x2="1260" y2="680"/>
    <line x1="1200" y1="650" x2="1220" y2="690"/><line x1="1180" y1="670" x2="1200" y2="650"/>
    <!-- Connection lines between continents -->
    <line x1="370" y1="400" x2="420" y2="550" stroke-dasharray="4,6" opacity="0.3"/>
    <line x1="360" y1="340" x2="750" y2="300" stroke-dasharray="4,6" opacity="0.3"/>
    <line x1="830" y1="320" x2="1000" y2="320" stroke-dasharray="4,6" opacity="0.3"/>
    <line x1="820" y1="560" x2="1000" y2="320" stroke-dasharray="4,6" opacity="0.2"/>
    <line x1="1200" y1="380" x2="1200" y2="650" stroke-dasharray="4,6" opacity="0.2"/>
  </g>
</svg>
